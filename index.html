<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OGDP</title>

  <!-- ✅ Security: Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://www.ogdp.in;
    connect-src https://www.ogdp.in;
    img-src 'self' data:;
    style-src 'self' 'unsafe-inline';
  ">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      -webkit-user-select: none;
      overflow: hidden;
    }
    #todayeq-widget {
      position: relative;
      width: 100%;
      height: 100%;
      box-shadow: -4px 0 12px rgba(0, 0, 0, 0.2);
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 10px;
      font-family: Arial, sans-serif;
      overflow-y: auto;
      box-sizing: border-box;
    }
    #todayeq-widget::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255, 255, 255, 0.1);
    }
    #todayeq-widget::-webkit-scrollbar {
      width: 6px;
    }
    #todayeq-widget::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div id="todayeq-widget"></div>
  <script src="https://www.ogdp.in/todayeq.js"></script>
</body>
</html>
