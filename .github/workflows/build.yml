name: Build and Release OGDP

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CI: true
  NODE_OPTIONS: --max_old_space_size=4096
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            icon-cmd: sudo apt-get install -y imagemagick
          - os: windows-latest
            icon-cmd: choco install imagemagick -y
          - os: macos-latest
            icon-cmd: brew install imagemagick
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies
        run: ${{ matrix.icon-cmd }}

      # 🔥 Combined cache (Electron + builder)
      - name: Cache Electron + Builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}

      - name: Install Dependencies (faster)
        run: npm ci --prefer-offline
        
      - name: Build Electron App
        run: npm run build -- --publish=never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          CSC_IDENTITY_AUTO_DISCOVERY: false
          
      - name: Prepare Linux Desktop Entry
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist/linux-unpacked/share/applications
          cp build/OGDP.desktop dist/linux-unpacked/share/applications/

      # 🔥 Standardized artifact naming
      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: OGDP-${{ matrix.os }}
          path: |
            dist/*
            !dist/**/*.blockmap
          compression-level: 6

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # 🔥 Download ALL artifacts (not just ubuntu)
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/

      # 🔥 Flatten directory (important)
      - name: Merge artifacts
        run: |
          mkdir final
          find dist -type f -exec cp {} final/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: final/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
