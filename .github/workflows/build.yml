name: Build and Release OGDP

on:
  push:
    branches: [main]
    tags:
      - 'v*'  # Only trigger release on tags starting with v
  workflow_dispatch:

env:
  CI: true
  NODE_OPTIONS: --max_old_space_size=4096
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            icon-cmd: sudo apt-get install -y imagemagick
          - os: windows-latest
            icon-cmd: choco install imagemagick -y
          - os: macos-latest
            icon-cmd: brew install imagemagick
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install System Dependencies
        run: ${{ matrix.icon-cmd }}

      - name: Install Project Dependencies
        run: |
          npm ci
          npm run postinstall

      - name: Cache Electron Builder
        uses: actions/cache@v3
        with:
          path: ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('package-lock.json') }}

      - name: Build Electron App
        run: npm run build
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Prepare Linux Desktop Entry (for AppImage taskbar icon)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist/linux-unpacked/share/applications
          cp build/OGDP.desktop dist/linux-unpacked/share/applications/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OGDP-${{ matrix.os }}-v${{ github.run_number }}
          path: |
            dist/*
            !dist/**/*.blockmap
          retention-days: 7
          compression-level: 9

      - name: Upload Build Metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-meta-${{ matrix.os }}
          path: |
            build/logs/
            dist/*.yml
            dist/*.json
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: OGDP-ubuntu-latest-v${{ github.run_number }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
